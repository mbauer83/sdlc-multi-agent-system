 0 0 941.373,660.0156 L941.373,536.2969 L931.373,526.2969 L477.5,526.2969 L473.5,491.5569 L469.5,526.2969 L8,526.2969 A2,2 0 0 0 6,528.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M931.373,526.2969 L931.373,535.2969 A1,1 0 0 0 932.373,536.2969 L941.373,536.2969 L931.373,526.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="209.8477" x="12" y="542.4355">Model-backed runtime boundaries:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="247.6816" x="12" y="556.4043">- Orchestration control: APP-016/017/018</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="340.1367" x="12" y="570.373">- Agent invocation runtime: APP-007/008 + APP-004/006</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="300.5332" x="12" y="584.3418">- User interaction entry: APP-020 serving ACT-001</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="561.7148" x="12" y="598.3105">- Event-sourced persistence path: APP-001 serving orchestration and interaction components</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="3.8145" x="12" y="612.2793">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="142.0664" x="12" y="626.248">Exemplar scoping note:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="427.4414" x="12" y="640.2168">- APP-008 is shown as the SA specialist exemplar for this Phase C slice.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="914.373" x="12" y="654.1855">- PM invocation is role-polymorphic via AgentRegistry; the same pattern applies to other specialist agents (for example APP-009/010/011/012/014/015).</text></g><!--reverse link APP_016 to APP_007--><g class="link" data-entity-1="APP_016" data-entity-2="APP_007" data-source-line="69" data-uid="lnk16" id="link_APP_016_APP_007"><path d="M907.2982,360.4244 C925.7982,369.0844 936.84,373.2069 957.5,379.2969 C1088.31,417.8469 1245.82,437.4269 1341.49,446.4869" fill="none" id="APP_016-backto-APP_007" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="896.43,355.3369,900.1683,361.5033,907.2982,360.4244,903.5599,354.2579,896.43,355.3369" style="stroke:#2E7D32;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="87.8438" x="1046.5" y="399.4355">&#171;composition&#187;</text></g><!--reverse link APP_016 to APP_008--><g class="link" data-entity-1="APP_016" data-entity-2="APP_008" data-source-line="70" data-uid="lnk17" id="link_APP_016_APP_008"><path d="M875.2737,297.4897 C893.7837,272.8297 919.03,245.6869 957.5,230.2969 C1034.25,199.5869 1253.29,198.2769 1329.5,230.2969 C1366.4,245.7969 1396.44,282.5069 1413.41,307.1269" fill="none" id="APP_016-backto-APP_008" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="868.07,307.0869,874.8709,304.6895,875.2737,297.4897,868.4728,299.887,868.07,307.0869" style="stroke:#2E7D32;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="87.8438" x="964" y="212.4355">&#171;composition&#187;</text></g><!--reverse link APP_016 to APP_018--><g class="link" data-entity-1="APP_016" data-entity-2="APP_018" data-source-line="71" data-uid="lnk18" id="link_APP_016_APP_018"><path d="M777.5956,361.0446 C754.7656,373.0846 748.15,383.6169 761.5,402.2969 C762.17,403.2269 802.96,417.1569 841.69,430.2269" fill="none" id="APP_016-backto-APP_018" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="788.21,355.4469,781.0369,354.7076,777.5956,361.0446,784.7687,361.7839,788