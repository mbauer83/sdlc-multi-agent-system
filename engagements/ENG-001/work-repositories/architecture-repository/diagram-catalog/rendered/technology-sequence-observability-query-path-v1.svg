29.4307" x="90.0552" y="350.8872">latest_checkpoint_state(snapshot_ref, updated_at)</text></g><g class="message" data-participant-1="APP_020" data-participant-2="APP_020"><line style="stroke:#181818;stroke-width:1;" x1="73.0552" x2="115.0552" y1="385.0859" y2="385.0859"/><line style="stroke:#181818;stroke-width:1;" x1="115.0552" x2="115.0552" y1="385.0859" y2="398.0859"/><line style="stroke:#181818;stroke-width:1;" x1="74.0552" x2="115.0552" y1="398.0859" y2="398.0859"/><polygon fill="#181818" points="84.0552,394.0859,74.0552,398.0859,84.0552,402.0859,80.0552,398.0859" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.665" x="80.0552" y="380.02">assemble_review_and_control_monitoring_view()</text></g><path d="M78,411.0859 L78,602.0859 L590,602.0859 L590,421.0859 L580,411.0859 L78,411.0859" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M580,411.0859 L580,421.0859 L590,421.0859 L580,411.0859" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="365.9805" x="84" y="428.1528">Scenario scope: read-side observability only (no writes).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="277.7734" x="84" y="443.2856">Dashboard observability features covered:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.646" x="84" y="458.4185">- open clarification requests and answer status</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="316.7163" x="84" y="473.5513">- pending sprint-review scope and decision state</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="340.8501" x="84" y="488.6841">- phase/gate lifecycle timeline and latest checkpoint</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="491.1499" x="84" y="503.8169">Design rule: prefer explicit read-model queries over opaque bundle names.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="423.0776" x="84" y="518.9497">If one transport endpoint is required for UI efficiency, model it as</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="405.1582" x="84" y="534.0825">an orchestrating facade that composes these domain queries.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="129.835" x="84" y="549.2153">Business relevance:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.5811" x="84" y="564.3481">- supports BPR-003 clarification lifecycle monitoring</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="359.7471" x="84" y="579.481">- supports BIA-001 sprint-review interaction monitoring</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="392.4946" x="84" y="594.6138">No replay/bootstrap or decision-control sequence is implied.</text><!--SRC=[ZLJ1Rjim3BtxAuYUN219q-sMmu0MtQ6NDLknsm23aUc4c2nfefmkVpzAiTEbQukTujZaUu-FJqgSBC73HYZkSSEMqm6-3XGFiCQqW_eXKCJ4tg65HqCE8_lBgWeO4niEw19StA7iDXvZ-wWW57-uc_Lwlloml00KqET6dwiM4svG22u-xycbn-GZZPNBw-VAvNLLZIqm_pIzMy6lhAdnWLnZh8hes1HPJIJz94dgi5FqPi_2gM6NyZns1kV5aZ1Hqx7LpvVL20xpYUZ3SWMlefV6GHhBakeYmiT6VrfssmQTF9tWNfKzLKg8gan1zqnFZHX5giTttCvWVD-IqI7-J-qveh8DL4ziAj4HjLA-5i09-LsjnSPjPaxSasL7exKfwgHSR9dyVKFLAnYDxZmoIVqUjzKEDTlioFmCFWzMBAZVe7chN1m6sVbiIpU38MZqg6qm_KkTKL24-esboKHqRMEyglMswRrZ3MfsCtzJ8PNpYI3oTfV0TwTqJqS3ob9Nkafivy8jWJyxMjxP0zJEmrDa5N-vg4w7vqLbHvguI0B6wvcYTbND8IVlFA0mnHzKDXoJ2CUmQlsOX34by-E0HucbVif3wQ3Sa1TtbHS7bZio1wENmxJ2qdBq79uzh-v8UAj21gjp1xLS5T3lOFLwI4SVUj-IBIlM040UHoT1_G-RmRNAuB0dML