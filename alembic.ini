# Alembic configuration for SDLC EventStore schema migrations.
#
# The events table and snapshots table live in per-engagement SQLite databases
# at engagements/<id>/workflow.db.  The URL below is the development default;
# override it with --url or via SDLC_DB_URL when targeting a specific engagement.

[alembic]
# Path to migration scripts (relative to repo root)
script_location = src/events/migrations

# SQLite dev default — one canonical engagement used during development
sqlalchemy.url = sqlite:///engagements/ENG-001/workflow.db

# -------------------------------------------------------------------------
# Logging (Alembic output)
# -------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
